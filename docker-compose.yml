version: '3.8'

services:
  filesite:
    build:
      context: .
      dockerfile: FileSite/Dockerfile
    container_name: filesite_app
    depends_on:
      - database
      - redis
    volumes:
      - uploads_data:/app/uploads # Mount persistent volume for uploads
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "8080:80"
    volumes:
      - ./FileSite/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - filesite
    networks:
      - app-network

  database:
    image: postgres:latest
    container_name: postgres_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=filesite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis_cache
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: # Define the new named volume
